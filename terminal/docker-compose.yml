services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./dashboard_v2
    ports:
      - "3000:5173"
    volumes:
      - ./dashboard_v2/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
